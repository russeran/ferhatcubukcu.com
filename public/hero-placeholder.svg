<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="">
  <defs>
    <linearGradient id="h1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d291f"/>
      <stop offset="45%" stop-color="#a84632"/>
      <stop offset="100%" stop-color="#2f4f4f"/>
    </linearGradient>
    <radialGradient id="h2" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#f4efe6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f4efe6" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#h1)"/>
  <rect width="1600" height="900" fill="url(#h2)"/>
  <rect width="1600" height="900" filter="url(#grain)" opacity="0.5"/>
